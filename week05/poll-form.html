<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Poll</title>
    <link rel="stylesheet" href="styles/poll-form.css">
</head>

<body>
    <header></header>
    <main>
        <h1>User Poll</h1>
        <form>
            <h2>contact information</h2>
            <div class="form-item colum2">
                <label for="fullname">Full Name</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-item column2">
                <label for="useremail">Email</label>
                <input type="email" id="useremail" name="useremail" required>
            </div>

            <div class="form-item column1">
                <label for="browser">What is your favorite internet browser?</label>
                <select name="browser" id="browser">
                    <option value="chrome">Chrome</option>
                    <option value="safari">Safari</option>
                    <option value="edge">Edge</option>
                    <option value="firefox">Firefox</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-item column1">
                <label for="pet">Do you have a household pet? (tick)</label>
                <input type="checkbox" id="pet" name="pet">
            </div>

            <div>
                <label for="feedback">List the places you have lived</label>
                <textarea id="feedback" name="feedback" rows="4"
                  placeholder="Johannesburg South Africa, Montreal Canada, Athens Greece, Lagos Nigeria"></textarea>
            </div>

            <div>
                <button type="submit">Submit Poll</button>
            </div>
        </form>
    </main>
    <footer>
        &copy;2026 🌴Suowari Preye Humphrey🌴 Lagos Nigeria
    </footer>
</body>

</html>
